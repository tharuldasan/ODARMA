<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ODARMA AI</title>

<link rel="icon" href="favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
ROOT
========================= */

:root{
    --bg:#050510;
    --panel:#0d0d18;
    --panel2:#141425;
    --line:rgba(255,255,255,0.06);
    --text:#ffffff;
    --muted:#8c8ca7;
    --neon:#15e0ff;
}

/* =========================
GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    color:var(--text);
    background:var(--bg);
    font-family:'Plus Jakarta Sans',sans-serif;

    background:
    radial-gradient(circle at top left,
    rgba(21,224,255,0.08),
    transparent 25%),

    radial-gradient(circle at bottom right,
    rgba(21,224,255,0.04),
    transparent 30%);
}

/* =========================
LOGIN
========================= */

#gate{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

.login-card{
    width:95%;
    max-width:560px;

    padding:45px;

    border-radius:42px;

    background:rgba(12,12,22,0.95);

    border:1px solid var(--line);

    backdrop-filter:blur(30px);

    text-align:center;
}

.hero{
    font-family:'Orbitron',sans-serif;
}

/* =========================
BIG LOGO
========================= */

.logo-ring{
    width:280px;
    height:280px;

    margin:auto;

    border-radius:50%;

    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;

    border:2px solid rgba(21,224,255,0.12);
}

.logo-ring::before{
    content:'';

    position:absolute;

    inset:-6px;

    border-radius:50%;

    border:4px solid transparent;

    border-top:4px solid var(--neon);
    border-right:4px solid var(--neon);

    animation:spin 2s linear infinite;
}

.logo{
    width:150px;
    height:150px;
    object-fit:contain;
    z-index:10;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.login-title{
    font-size:42px;
    margin-top:26px;
    margin-bottom:30px;
}

/* =========================
INPUTS
========================= */

.login-input{
    width:100%;

    margin-top:14px;

    padding:18px;

    border-radius:18px;

    background:rgba(255,255,255,0.04);

    border:1px solid var(--line);

    color:white;

    outline:none;

    font-size:15px;
}

.auth-buttons{
    display:flex;
    gap:14px;
    margin-top:24px;
}

.auth-btn{
    flex:1;

    padding:18px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    font-weight:700;

    transition:0.2s;
}

.login-btn{
    background:linear-gradient(
    135deg,
    #15e0ff,
    #00c8ff
    );

    color:black;
}

.signup-btn{
    background:transparent;

    color:white;

    border:1px solid rgba(21,224,255,0.25);
}

.auth-btn:hover{
    transform:translateY(-2px);
}

/* =========================
APP
========================= */

.app{
    width:100%;
    height:100%;
    display:flex;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
    width:300px;

    height:100%;

    background:rgba(10,10,20,0.95);

    border-right:1px solid var(--line);

    display:flex;

    flex-direction:column;

    backdrop-filter:blur(20px);

    transition:0.3s ease;
}

/* =========================
SIDEBAR TOP
========================= */

.sidebar-top{
    padding:20px;

    border-bottom:1px solid var(--line);
}

.top-row{
    display:flex;

    align-items:center;

    justify-content:space-between;

    margin-bottom:18px;
}

.logo-title{
    font-size:24px;

    font-weight:800;

    letter-spacing:1px;
}

.sidebar-buttons{
    display:flex;
    gap:10px;
}

/* =========================
BUTTONS
========================= */

.icon-btn{
    width:44px;
    height:44px;

    border-radius:15px;

    background:rgba(255,255,255,0.04);

    border:1px solid var(--line);

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    transition:0.2s;
}

.icon-btn:hover{
    background:rgba(21,224,255,0.12);

    border-color:rgba(21,224,255,0.3);

    transform:translateY(-2px);
}

/* =========================
SEARCH
========================= */

.search-input{
    width:100%;

    padding:14px 16px;

    border-radius:16px;

    border:1px solid var(--line);

    background:rgba(255,255,255,0.04);

    color:white;

    outline:none;
}

/* =========================
THREADS
========================= */

#threadList{
    flex:1;

    overflow-y:auto;

    padding:14px;
}

.thread{
    padding:16px;

    border-radius:18px;

    margin-bottom:10px;

    position:relative;

    cursor:pointer;

    border:1px solid transparent;

    transition:0.2s;
}

.thread:hover{
    background:rgba(255,255,255,0.04);
}

.thread.active{
    background:rgba(21,224,255,0.08);

    border:1px solid rgba(21,224,255,0.18);
}

.thread-name{
    font-size:14px;

    font-weight:700;

    padding-right:30px;
}

/* =========================
THREAD MENU
========================= */

.thread-menu{
    position:absolute;

    top:12px;

    right:12px;
}

.menu-btn{
    background:none;

    border:none;

    color:#aaa;

    font-size:18px;

    cursor:pointer;
}

.dropdown{
    position:absolute;

    top:28px;

    right:0;

    width:150px;

    background:#151524;

    border:1px solid var(--line);

    border-radius:16px;

    overflow:hidden;

    display:none;

    z-index:999;
}

.dropdown button{
    width:100%;

    background:none;

    border:none;

    color:white;

    text-align:left;

    padding:14px;

    cursor:pointer;
}

.dropdown button:hover{
    background:rgba(255,255,255,0.05);
}

/* =========================
MAIN
========================= */

.main{
    flex:1;

    display:flex;

    flex-direction:column;

    position:relative;
}

/* =========================
HEADER
========================= */

.header{
    height:76px;

    border-bottom:1px solid var(--line);

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 24px;

    background:rgba(10,10,20,0.65);

    backdrop-filter:blur(20px);
}

.header-title{
    font-size:18px;

    font-weight:800;
}

.mobile-menu{
    display:none;
}

/* =========================
CHAT FEED
========================= */

#feed{
    flex:1;

    overflow-y:auto;

    padding:40px 20px 180px;
}

.feed-container{
    width:100%;

    max-width:950px;

    margin:auto;
}

/* =========================
MESSAGES
========================= */

.message-row{
    width:100%;

    display:flex;

    margin-bottom:24px;
}

.message-row.user{
    justify-content:flex-end;
}

.message{
    max-width:760px;

    padding:22px 24px;

    border-radius:24px;

    line-height:1.8;

    font-size:15px;

    white-space:pre-wrap;

    word-wrap:break-word;
}

.user .message{
    background:linear-gradient(
    135deg,
    rgba(21,224,255,0.18),
    rgba(21,224,255,0.08)
    );

    border:1px solid rgba(21,224,255,0.14);
}

.ai .message{
    background:rgba(255,255,255,0.04);

    border:1px solid var(--line);
}

/* =========================
INPUT
========================= */

.input-area{
    position:absolute;

    left:0;
    right:0;
    bottom:0;

    padding:24px;

    background:linear-gradient(
    to top,
    rgba(5,5,16,1),
    rgba(5,5,16,0)
    );
}

.input-container{
    width:100%;

    max-width:950px;

    margin:auto;
}

.input-box{
    display:flex;

    align-items:flex-end;

    gap:14px;

    background:rgba(12,12,24,0.96);

    border:1px solid var(--line);

    border-radius:30px;

    padding:12px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35);
}

#prompt{
    flex:1;

    border:none;

    outline:none;

    resize:none;

    background:none;

    color:white;

    padding:16px;

    font-size:15px;

    max-height:220px;

    overflow-y:auto;
}

.send-btn{
    width:60px;
    height:60px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    background:linear-gradient(
    135deg,
    #15e0ff,
    #00c8ff
    );

    color:black;

    transition:0.2s;
}

.send-btn:hover{
    transform:scale(1.05);
}

/* =========================
MOBILE
========================= */

@media(max-width:900px){

    .sidebar{
        position:fixed;

        left:-100%;

        top:0;
        bottom:0;

        z-index:4000;
    }

    .sidebar.open{
        left:0;
    }

    .mobile-menu{
        display:flex;
    }

    .message{
        max-width:100%;
    }

    #feed{
        padding:20px 14px 180px;
    }

    .logo-ring{
        width:220px;
        height:220px;
    }

    .logo{
        width:120px;
        height:120px;
    }

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
    width:5px;
}

::-webkit-scrollbar-thumb{
    background:rgba(21,224,255,0.4);
    border-radius:20px;
}

</style>

</head>

<body>

<!-- =========================
LOGIN
========================= -->

<div id="gate">

<div class="login-card">

<div class="logo-ring">
<img src="favicon.png" class="logo">
</div>

<h1 class="hero login-title">
ODARMA
</h1>

<input
id="email"
class="login-input"
placeholder="EMAIL">

<input
id="password"
type="password"
class="login-input"
placeholder="PASSWORD">

<div class="auth-buttons">

<button
class="auth-btn login-btn"
onclick="login()">
LOGIN
</button>

<button
class="auth-btn signup-btn"
onclick="signup()">
SIGN UP
</button>

</div>

</div>

</div>

<!-- =========================
APP
========================= -->

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-top">

<div class="top-row">

<div class="hero logo-title">
ODARMA
</div>

<div class="sidebar-buttons">

<div
class="icon-btn"
onclick="toggleSidebar()">

<i data-lucide="panel-left"></i>

</div>

<div
class="icon-btn"
onclick="newChat()">

<i data-lucide="plus"></i>

</div>

<div
class="icon-btn"
onclick="logout()">

<i data-lucide="log-out"></i>

</div>

</div>

</div>

<input
id="searchInput"
class="search-input"
placeholder="Search conversations..."
oninput="renderThreads()">

</div>

<div id="threadList"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div
class="icon-btn mobile-menu"
onclick="toggleSidebar()">

<i data-lucide="menu"></i>

</div>

<div class="header-title">
ODARMA AI
</div>

</div>

<div id="feed">

<div
class="feed-container"
id="feedContainer">

</div>

</div>

<div class="input-area">

<div class="input-container">

<div class="input-box">

<textarea
id="prompt"
placeholder="Ask ODARMA..."
rows="1"></textarea>

<button
class="send-btn"
onclick="sendMessage()">

<i data-lucide="zap"></i>

</button>

</div>

</div>

</div>

</div>

</div>

<script>

lucide.createIcons();

/* =========================
CONFIG
========================= */

const API_URL =
"https://openrouter.ai/api/v1/chat/completions";

const API_KEY =
"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";

const MODEL =
"meta-llama/llama-3.3-70b-instruct:free";

/* =========================
DATABASE
========================= */

let db = JSON.parse(
localStorage.getItem("odarma_db")
) || {
users:{}
};

let activeUser =
localStorage.getItem("odarma_user")
|| null;

let activeChat = null;

/* =========================
SAVE
========================= */

function save(){

localStorage.setItem(
"odarma_db",
JSON.stringify(db)
);

}

/* =========================
SIGNUP
========================= */

function signup(){

const email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

if(!email || !password){

alert("Fill all fields");

return;

}

if(db.users[email]){

alert("User already exists");

return;

}

db.users[email] = {

password:password,
threads:[]

};

save();

alert("Account created");

}

/* =========================
LOGIN
========================= */

function login(){

const email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

if(
db.users[email] &&
db.users[email].password===password
){

activeUser = email;

localStorage.setItem(
"odarma_user",
email
);

document.getElementById("gate")
.style.display = "none";

renderThreads();

}
else{

alert("Invalid login");

}

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem(
"odarma_user"
);

location.reload();

}

/* =========================
NEW CHAT
========================= */

function newChat(){

const id =
"chat_" + Date.now();

db.users[activeUser]
.threads.unshift({

id:id,
title:"New Chat",
messages:[]

});

activeChat=id;

save();

renderThreads();

renderMessages();

closeSidebarMobile();

}

/* =========================
RENDER THREADS
========================= */

function renderThreads(){

const list =
document.getElementById("threadList");

const search =
document.getElementById("searchInput")
.value.toLowerCase();

list.innerHTML="";

db.users[activeUser]
.threads
.filter(thread=>
thread.title
.toLowerCase()
.includes(search)
)
.forEach(thread=>{

const div =
document.createElement("div");

div.className="thread";

if(activeChat===thread.id){
div.classList.add("active");
}

div.innerHTML=`

<div class="thread-name">
${thread.title}
</div>

<div class="thread-menu">

<button
class="menu-btn"
onclick="toggleMenu(event,'${thread.id}')">
⋮
</button>

<div
class="dropdown"
id="menu_${thread.id}">

<button
onclick="renameChat('${thread.id}')">
Rename
</button>

<button
onclick="deleteChat('${thread.id}')"
style="color:#ff6666;">
Delete
</button>

</div>

</div>
`;

div.onclick=()=>{

activeChat=thread.id;

renderThreads();

renderMessages();

closeSidebarMobile();

};

list.appendChild(div);

});

}

/* =========================
DROPDOWNS
========================= */

document.addEventListener(
"click",
()=>{

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

}
);

function toggleMenu(e,id){

e.stopPropagation();

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

const menu =
document.getElementById(
"menu_" + id
);

menu.style.display =
menu.style.display==="block"
? "none"
: "block";

}

/* =========================
RENAME CHAT
========================= */

function renameChat(id){

const newName =
prompt("New conversation name");

if(!newName) return;

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===id
);

chat.title = newName;

save();

renderThreads();

}

/* =========================
DELETE CHAT
========================= */

function deleteChat(id){

db.users[activeUser]
.threads =
db.users[activeUser]
.threads.filter(
t=>t.id!==id
);

if(activeChat===id){

activeChat=null;

document.getElementById(
"feedContainer"
).innerHTML="";

}

save();

renderThreads();

}

/* =========================
RENDER MESSAGES
========================= */

function renderMessages(){

const container =
document.getElementById(
"feedContainer"
);

container.innerHTML="";

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===activeChat
);

if(!chat) return;

chat.messages.forEach(msg=>{

const row =
document.createElement("div");

row.className =
"message-row " + msg.role;

const bubble =
document.createElement("div");

bubble.className =
"message";

bubble.innerHTML =
formatMessage(msg.content);

row.appendChild(bubble);

container.appendChild(row);

});

scrollBottom();

}

/* =========================
FORMAT
========================= */

function formatMessage(text){

return text
.replace(/\n/g,"<br>");

}

/* =========================
SEND MESSAGE
========================= */

async function sendMessage(){

const input =
document.getElementById("prompt");

const text =
input.value.trim();

if(!text) return;

if(!activeChat){
newChat();
}

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===activeChat
);

/* AUTO TITLE */

if(chat.title==="New Chat"){

chat.title =
text.length > 30
? text.substring(0,30)+"..."
: text;

}

/* USER MESSAGE */

chat.messages.push({

role:"user",
content:text

});

renderThreads();

renderMessages();

input.value="";

/* AI MESSAGE */

const container =
document.getElementById(
"feedContainer"
);

const row =
document.createElement("div");

row.className =
"message-row ai";

const bubble =
document.createElement("div");

bubble.className =
"message";

bubble.innerHTML =
"Thinking...";

row.appendChild(bubble);

container.appendChild(row);

scrollBottom();

try{

const response =
await fetch(API_URL,{

method:"POST",

headers:{

"Authorization":
`Bearer ${API_KEY}`,

"Content-Type":
"application/json",

"HTTP-Referer":
window.location.href,

"X-Title":
"ODARMA AI"

},

body:JSON.stringify({

model:MODEL,

messages:chat.messages.map(m=>({

role:
m.role==="ai"
? "assistant"
: "user",

content:m.content

}))

})

});

const data =
await response.json();

console.log(data);

if(data.error){

bubble.innerHTML =
data.error.message;

return;

}

const reply =
data.choices?.[0]
?.message?.content
|| "No response";

bubble.innerHTML =
formatMessage(reply);

chat.messages.push({

role:"ai",
content:reply

});

save();

}
catch(err){

console.error(err);

bubble.innerHTML =
"Connection Error";

}

}

/* =========================
SCROLL
========================= */

function scrollBottom(){

const feed =
document.getElementById("feed");

feed.scrollTop =
feed.scrollHeight;

}

/* =========================
SIDEBAR
========================= */

function toggleSidebar(){

document
.getElementById("sidebar")
.classList.toggle("open");

}

function closeSidebarMobile(){

if(window.innerWidth < 900){

document
.getElementById("sidebar")
.classList.remove("open");

}

}

/* =========================
ENTER SEND
========================= */

document
.getElementById("prompt")
.addEventListener(
"keydown",
function(e){

if(
e.key==="Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* =========================
AUTO LOGIN
========================= */

if(activeUser){

document.getElementById("gate")
.style.display="none";

renderThreads();

}

</script>

</body>
</html>
