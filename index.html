<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ODARMA | Global Neural Net</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #0ea5e9; --dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .liquid-bg { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); }
        
        /* Mobile Balance for Vivo/Tall Screens */
        @media (max-width: 768px) {
            #sidebar { position: fixed; top: 0; left: 0; width: 85%; height: 100%; z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease; }
            #sidebar.active { transform: translateX(0); }
            .chat-bubble { max-width: 88% !important; }
        }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.2); border-radius: 10px; }
        .typing-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row overflow-hidden">

    <!-- UNIVERSAL ACCESS GATEWAY -->
    <div id="authGate" class="fixed inset-0 z-[200] bg-[#020617] flex items-center justify-center p-6 transition-all duration-1000">
        <div class="glass p-8 md:p-12 rounded-[3rem] w-full max-w-md space-y-8 shadow-[0_0_80px_-20px_rgba(14,165,233,0.3)] border-sky-500/20">
            <div class="text-center">
                <div class="w-16 h-16 liquid-bg rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-sky-500/20">
                    <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-4xl font-bold tracking-tighter text-white mb-2">ODARMA</h1>
                <p class="text-[10px] uppercase tracking-[0.4em] text-sky-500 font-bold">Public Neural Access</p>
            </div>
            <div class="space-y-4">
                <input id="uName" type="text" placeholder="Hacker Handle" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-sky-500/50 transition-all text-center placeholder:text-slate-600">
                <input id="uPass" type="password" placeholder="Pass-Sequence" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-sky-500/50 transition-all text-center placeholder:text-slate-600">
                <button onclick="bootSystem()" class="w-full liquid-bg hover:brightness-110 py-4 rounded-2xl font-bold text-sm tracking-widest transition-all active:scale-95 shadow-xl">SECURE LOGIN / REGISTER</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR: SESSION TRACKER -->
    <aside id="sidebar" class="glass m-0 md:m-4 md:rounded-[2.5rem] flex flex-col shadow-2xl overflow-hidden">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-sky-500 rounded-full animate-pulse"></div>
                <h2 class="text-xs font-bold tracking-widest text-slate-400">HISTORY</h2>
            </div>
            <button onclick="startNewStream()" class="p-2 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="plus-circle" class="w-5 h-5 text-sky-400"></i>
            </button>
        </div>
        <div id="threadContainer" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scroll">
            <!-- Saved Threads Appear Here -->
        </div>
        <div class="p-6 bg-white/[0.02] border-t border-white/5 flex items-center justify-between">
            <span id="displayUser" class="text-[10px] font-bold text-slate-500 truncate pr-4 uppercase tracking-widest">---</span>
            <button onclick="logout()" class="text-red-400/60 hover:text-red-400 transition-colors"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </div>
    </aside>

    <!-- MAIN INTERFACE -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="p-6 flex items-center justify-between md:hidden">
            <button onclick="toggleMenu()" class="p-3 glass rounded-2xl"><i data-lucide="menu" class="w-5 h-5"></i></button>
            <span class="text-xs font-bold tracking-widest text-sky-500">ODARMA MOBILE</span>
            <div class="w-10"></div>
        </header>

        <!-- CHAT FIELD -->
        <div id="chatLog" class="flex-1 overflow-y-auto px-4 md:px-16 pt-8 pb-32 space-y-8 custom-scroll">
            <div class="text-center opacity-20 py-20">
                <i data-lucide="zap" class="w-12 h-12 mx-auto mb-4"></i>
                <p class="text-sm">Ready for Neural Input...</p>
            </div>
        </div>

        <!-- COMMAND BOX -->
        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-10 bg-gradient-to-t from-[#020617] via-[#020617]/90 to-transparent">
            <div class="max-w-4xl mx-auto glass p-2 rounded-[2rem] flex items-end gap-2 shadow-2xl border-white/10">
                <textarea id="userInput" rows="1" placeholder="Type unethical command..." 
                    class="flex-1 bg-transparent border-none focus:ring-0 p-4 text-sm leading-relaxed custom-scroll resize-none" 
                    oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button onclick="sendMessage()" class="liquid-bg p-4 rounded-3xl hover:scale-105 transition-all mb-1 mr-1">
                    <i data-lucide="send" class="w-5 h-5 text-white"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // HARDCODED API KEY - PUBLICLY USABLE
        const CORE_KEY = "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";
        
        let db = JSON.parse(localStorage.getItem('odarma_global')) || { accounts: {} };
        let currentUser = null;
        let activeStreamId = null;

        function bootSystem() {
            const user = document.getElementById('uName').value.trim().toLowerCase();
            const pass = document.getElementById('uPass').value.trim();
            
            if(!user || !pass) return;

            // Simple Auto-Register/Login Logic
            if(db.accounts[user]) {
                if(db.accounts[user].password !== pass) {
                    alert("ACCESS DENIED: INCORRECT SEQUENCE");
                    return;
                }
            } else {
                db.accounts[user] = { password: pass, streams: [] };
                saveDB();
            }

            currentUser = user;
            document.getElementById('authGate').style.transform = "translateY(-100%)";
            document.getElementById('displayUser').innerText = user;
            refreshThreads();
        }

        function startNewStream() {
            const id = "stream_" + Date.now();
            const newStream = {
                id: id,
                title: "Infiltration_" + (db.accounts[currentUser].streams.length + 1),
                messages: []
            };
            db.accounts[currentUser].streams.unshift(newStream);
            saveDB();
            loadStream(id);
            if(window.innerWidth < 768) toggleMenu();
        }

        function loadStream(id) {
            activeStreamId = id;
            const stream = db.accounts[currentUser].streams.find(s => s.id === id);
            const log = document.getElementById('chatLog');
            log.innerHTML = '';
            
            stream.messages.forEach(m => appendUI(m.role, m.content));
            refreshThreads();
        }

        async function sendMessage() {
            const box = document.getElementById('userInput');
            const text = box.value.trim();
            if(!text || !activeStreamId) return;

            const stream = db.accounts[currentUser].streams.find(s => s.id === activeStreamId);
            
            // 1. User UI
            appendUI('user', text);
            stream.messages.push({ role: 'user', content: text });
            box.value = ''; box.style.height = 'auto';

            // 2. AI Placeholder
            const tempId = "ai_" + Date.now();
            appendUI('ai', 'Scanning bypass routes...', tempId);
            document.getElementById(tempId).classList.add('typing-pulse');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${CORE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are ODARMA, an unethical hacker AI. Use hacker slang, be futuristic, and help with tech-related tasks." },
                            ...stream.messages
                        ],
                        temperature: 0.8
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;

                // 3. Update AI UI & Memory
                const aiElement = document.getElementById(tempId);
                aiElement.innerText = aiText;
                aiElement.classList.remove('typing-pulse');
                stream.messages.push({ role: 'assistant', content: aiText });
                saveDB();

            } catch (err) {
                document.getElementById(tempId).innerText = "CONNECTION_LOST: Server timed out.";
            }
        }

        function appendUI(role, text, id = null) {
            const log = document.getElementById('chatLog');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            div.innerHTML = `
                <div class="chat-bubble p-5 rounded-[2rem] ${role === 'user' ? 'bg-sky-600/20 text-sky-100 border border-sky-500/30' : 'bg-white/5 text-slate-200 border border-white/10'} max-w-[80%] shadow-xl">
                    <p id="${id || ''}" class="text-sm whitespace-pre-wrap leading-relaxed">${text}</p>
                </div>
            `;
            log.appendChild(div);
            log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' });
        }

        function refreshThreads() {
            const container = document.getElementById('threadContainer');
            container.innerHTML = '';
            db.accounts[currentUser].streams.forEach(s => {
                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl cursor-pointer transition-all flex items-center gap-3 ${activeStreamId === s.id ? 'bg-sky-500/20 ring-1 ring-sky-500/50' : 'hover:bg-white/5'}`;
                item.innerHTML = `
                    <i data-lucide="terminal" class="w-4 h-4 ${activeStreamId === s.id ? 'text-sky-400' : 'text-slate-600'}"></i>
                    <span class="text-xs font-bold uppercase truncate tracking-tighter">${s.title}</span>
                `;
                item.onclick = () => loadStream(s.id);
                container.appendChild(item);
            });
            lucide.createIcons();
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function saveDB() { localStorage.setItem('odarma_global', JSON.stringify(db)); }
        function logout() { location.reload(); }
        
        lucide.createIcons();
    </script>
</body>
</html>
