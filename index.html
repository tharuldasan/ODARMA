<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ODARMA | Neural Interface v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --sky-glow: #0ea5e9; --deep-bg: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--deep-bg); color: #f8fafc; overflow: hidden; touch-action: manipulation; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        .liquid-text { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Mobile-Specific Balance */
        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; right: 0; height: 60vh; z-index: 50; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
            #sidebar.open { transform: translateY(0); }
            .chat-bubble { max-width: 90% !important; }
        }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.3); border-radius: 10px; }
        
        @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.5; } }
        .thinking-dot { animation: pulse-ring 1.5s infinite ease-in-out; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row">

    <!-- Auth Gateway -->
    <div id="authGate" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6 transition-all duration-700">
        <div class="glass-panel p-10 rounded-[2.5rem] w-full max-w-md space-y-8 shadow-[0_0_50px_-12px_rgba(14,165,233,0.4)]">
            <div class="text-center">
                <h1 class="text-5xl font-bold tracking-tighter liquid-text mb-2">ODARMA</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-sky-500/60">Biometric Verification Required</p>
            </div>
            <div class="space-y-4">
                <input id="uName" type="text" placeholder="Access Identity" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-sky-500/50 transition-all text-center">
                <input id="uPass" type="password" placeholder="Key Sequence" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-sky-500/50 transition-all text-center">
                <button onclick="login()" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-2xl font-bold text-sm tracking-widest transition-all active:scale-95 shadow-lg shadow-sky-900/20">INITIALIZE LINK</button>
            </div>
        </div>
    </div>

    <!-- Sidebar / Session Manager -->
    <aside id="sidebar" class="w-full md:w-80 glass-panel md:m-4 md:rounded-[2rem] flex flex-col overflow-hidden">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-sm font-bold tracking-widest text-slate-400">SESSION_LOG</h2>
            <button onclick="newThread()" class="p-2 bg-sky-500/10 rounded-full hover:bg-sky-500/20 transition-all">
                <i data-lucide="plus" class="w-5 h-5 text-sky-400"></i>
            </button>
        </div>
        <div id="threadList" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scroll"></div>
        <div class="p-6 border-t border-white/5 bg-white/2 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
                <span id="activeUser" class="text-[10px] font-bold uppercase text-slate-500">Standby</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-sky-400 text-xs font-bold">CLOSE</button>
        </div>
    </aside>

    <!-- Main Brain Interface -->
    <main class="flex-1 flex flex-col p-2 md:p-4 overflow-hidden relative">
        <!-- Floating Header -->
        <header class="absolute top-8 left-0 right-0 z-10 flex justify-center pointer-events-none">
            <div class="glass-panel px-6 py-2 rounded-full flex items-center gap-4 pointer-events-auto shadow-xl">
                <button onclick="toggleSidebar()" class="md:hidden"><i data-lucide="menu" class="w-4 h-4"></i></button>
                <div class="w-px h-4 bg-white/10 md:hidden"></div>
                <span class="text-[10px] font-bold tracking-widest text-sky-400">NEURAL_STREAMS</span>
            </div>
        </header>

        <!-- Message Field -->
        <div id="neuralField" class="flex-1 overflow-y-auto pt-24 pb-32 px-4 md:px-12 space-y-10 custom-scroll"></div>

        <!-- Command Input -->
        <div class="absolute bottom-6 left-0 right-0 px-4 md:px-12">
            <div class="max-w-4xl mx-auto glass-panel p-2 rounded-[2rem] flex items-end gap-2 focus-within:ring-2 ring-sky-500/20 transition-all">
                <textarea id="cmdInput" rows="1" placeholder="Enter Neural Command..." 
                    class="flex-1 bg-transparent border-none focus:ring-0 p-4 text-sm leading-relaxed custom-scroll resize-none" 
                    oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button onclick="dispatch()" class="bg-sky-600 p-4 rounded-[1.5rem] hover:bg-sky-500 transition-all mb-1 mr-1">
                    <i data-lucide="zap" class="w-5 h-5 text-white"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Tactical Action Menu -->
    <div id="tacticalMenu" class="fixed z-[200] hidden glass-panel rounded-2xl overflow-hidden min-w-[160px] shadow-2xl border border-sky-500/20">
        <button onclick="renameThread()" class="w-full text-left px-4 py-3 text-xs hover:bg-sky-500/10 flex items-center gap-3 transition-colors">
            <i data-lucide="type" class="w-3 h-3 text-sky-400"></i> RENAME_NODE
        </button>
        <button onclick="purgeThread()" class="w-full text-left px-4 py-3 text-xs text-red-400 hover:bg-red-500/10 flex items-center gap-3 transition-colors border-t border-white/5">
            <i data-lucide="trash-2" class="w-3 h-3"></i> PURGE_DATA
        </button>
    </div>

    <script>
        const GROQ_KEY = "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";
        let state = JSON.parse(localStorage.getItem('odarma_v3')) || { users: {} };
        let user = null; let activeId = null; let menuId = null;

        function login() {
            const n = document.getElementById('uName').value.trim();
            const p = document.getElementById('uPass').value.trim();
            if(!n || !p) return;
            if(state.users[n] && state.users[n].p !== p) return alert("SECURITY BREACH: INVALID KEY");
            if(!state.users[n]) state.users[n] = { p, threads: [] };
            user = n;
            document.getElementById('authGate').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('activeUser').innerText = user;
            save(); renderThreads();
        }

        function newThread() {
            const id = Date.now();
            state.users[user].threads.unshift({ id, title: "Neural Stream " + (state.users[user].threads.length + 1), logs: [] });
            save(); loadThread(id);
            if(window.innerWidth < 768) toggleSidebar();
        }

        function loadThread(id) {
            activeId = id;
            const thread = state.users[user].threads.find(t => t.id === id);
            const field = document.getElementById('neuralField');
            field.innerHTML = '';
            thread.logs.forEach(l => renderMsg(l.role, l.text));
            renderThreads();
        }

        async function dispatch() {
            const input = document.getElementById('cmdInput');
            const text = input.value.trim();
            if(!text || !activeId) return;
            
            const thread = state.users[user].threads.find(t => t.id === activeId);
            renderMsg('user', text);
            thread.logs.push({ role: 'user', text });
            input.value = ''; input.style.height = 'auto';

            const lId = 'ai_' + Date.now();
            renderMsg('ai', 'PROCESSING...', lId);

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role:"system", content:"You are ODARMA, a futuristic hacker AI helper."}, ...thread.logs.map(l => ({role: l.role === 'ai' ? 'assistant' : 'user', content: l.text}))],
                        temperature: 0.6
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById(lId).innerText = reply;
                thread.logs.push({ role: 'ai', text: reply });
                save();
            } catch (e) { document.getElementById(lId).innerText = "NETWORK_FAILURE: RETRY"; }
        }

        function renderMsg(role, text, id = null) {
            const field = document.getElementById('neuralField');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-4 duration-500`;
            div.innerHTML = `
                <div class="chat-bubble ${role === 'user' ? 'bg-sky-600/10 border border-sky-500/20' : 'bg-white/5 border border-white/10'} rounded-3xl p-5 max-w-[75%] text-sm leading-relaxed shadow-lg">
                    <p id="${id || ''}" class="whitespace-pre-wrap font-medium">${text}</p>
                </div>`;
            field.appendChild(div);
            field.scrollTo({ top: field.scrollHeight, behavior: 'smooth' });
        }

        function renderThreads() {
            const list = document.getElementById('threadList');
            list.innerHTML = '';
            state.users[user].threads.forEach(t => {
                const btn = document.createElement('div');
                btn.className = `p-4 rounded-2xl cursor-pointer text-xs flex items-center gap-3 transition-all ${activeId === t.id ? 'bg-sky-500/20 text-sky-400 ring-1 ring-sky-500/50' : 'hover:bg-white/5 text-slate-400'}`;
                btn.innerHTML = `<i data-lucide="activity" class="w-3 h-3"></i> <span class="truncate uppercase tracking-tighter">${t.title}</span>`;
                btn.onclick = () => loadThread(t.id);
                btn.oncontextmenu = (e) => { e.preventDefault(); showMenu(e, t.id); };
                list.appendChild(btn);
            });
            lucide.createIcons();
        }

        function showMenu(e, id) {
            menuId = id;
            const menu = document.getElementById('tacticalMenu');
            menu.style.display = 'block';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 180) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 100) + 'px';
        }

        function renameThread() {
            const n = prompt("ENTER NEW IDENTITY:");
            if(n) {
                state.users[user].threads.find(t => t.id === menuId).title = n;
                save(); renderThreads();
            }
        }

        function purgeThread() {
            if(confirm("PURGE THIS DATA NODE?")) {
                state.users[user].threads = state.users[user].threads.filter(t => t.id !== menuId);
                if(activeId === menuId) { activeId = null; document.getElementById('neuralField').innerHTML = ''; }
                save(); renderThreads();
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function save() { localStorage.setItem('odarma_v3', JSON.stringify(state)); }
        window.onclick = () => document.getElementById('tacticalMenu').style.display = 'none';
        lucide.createIcons();
    </script>
</body>
</html>
