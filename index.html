<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>ODARMA | Absolute Neural Interface</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">

<style>

:root{
    --neon:#00f2ff;
    --bg:#020205;
    --glass:rgba(15,15,25,0.82);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:white;
    overflow:hidden;
    font-family:'Plus Jakarta Sans',sans-serif;
    width:100vw;
    height:100vh;
}

/* ===== BACKGROUND ===== */

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,
    rgba(0,242,255,0.08),
    transparent 35%),

    radial-gradient(circle at bottom right,
    rgba(0,242,255,0.05),
    transparent 35%);
    pointer-events:none;
}

/* ===== GLASS ===== */

.glass{
    background:var(--glass);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.06);
}

/* ===== FONTS ===== */

.hero{
    font-family:'Orbitron',sans-serif;
}

/* ===== LOGIN ===== */

#gate{
    position:fixed;
    inset:0;
    z-index:5000;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
    transition:1s ease;
}

/* ===== LOGO RING ===== */

.logo-ring{
    width:240px;
    height:240px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:2px solid rgba(0,242,255,0.12);
}

.logo-ring::before{
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:3px solid transparent;
    border-top:3px solid var(--neon);
    border-right:3px solid var(--neon);
    animation:spin 2s linear infinite;
}

.logo-img{
    width:110px;
    height:110px;
    object-fit:contain;
    position:relative;
    z-index:10;
    display:block;
}

/* ===== APP ===== */

.app{
    width:100%;
    height:100%;
    display:flex;
}

/* ===== SIDEBAR ===== */

.sidebar{
    width:320px;
    margin:16px;
    border-radius:34px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:0.35s ease;
}

.sidebar-top{
    padding:24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.sidebar-actions{
    display:flex;
    gap:10px;
}

.side-btn{
    width:42px;
    height:42px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    transition:0.25s;
}

.side-btn:hover{
    background:rgba(0,242,255,0.12);
}

.thread-search{
    padding:16px;
}

.thread-search input{
    width:100%;
    background:rgba(255,255,255,0.05);
    border:none;
    outline:none;
    color:white;
    padding:14px;
    border-radius:16px;
    font-size:13px;
}

#threadList{
    flex:1;
    overflow-y:auto;
    padding:16px;
}

.thread{
    padding:16px;
    border-radius:20px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.25s;
    position:relative;
}

.thread:hover{
    background:rgba(255,255,255,0.05);
}

.thread.active{
    background:rgba(0,242,255,0.12);
    border:1px solid rgba(0,242,255,0.3);
}

.thread-title{
    font-size:13px;
    font-weight:700;
}

.thread-menu{
    position:absolute;
    top:12px;
    right:12px;
    opacity:0;
    transition:0.25s;
}

.thread:hover .thread-menu{
    opacity:1;
}

.thread-dropdown{
    position:absolute;
    right:0;
    top:32px;
    width:140px;
    border-radius:16px;
    overflow:hidden;
    z-index:200;
    display:none;
}

.thread-dropdown button{
    width:100%;
    border:none;
    background:none;
    color:white;
    padding:14px;
    text-align:left;
    cursor:pointer;
}

.thread-dropdown button:hover{
    background:rgba(255,255,255,0.05);
}

/* ===== MAIN ===== */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
}

/* ===== HEADER ===== */

.header{
    padding:24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.mobile-menu{
    display:none;
}

/* ===== CHAT ===== */

#feed{
    flex:1;
    overflow-y:auto;
    padding:20px;
    padding-bottom:180px;
}

.msg-wrap{
    width:100%;
    display:flex;
    margin-bottom:24px;
}

.msg-wrap.user{
    justify-content:flex-end;
}

.msg{
    max-width:85%;
    padding:22px;
    border-radius:28px;
    line-height:1.7;
    font-size:14px;
}

.user .msg{
    background:rgba(0,242,255,0.15);
    border:1px solid rgba(0,242,255,0.2);
}

.ai .msg{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.06);
}

/* ===== INPUT ===== */

.input-area{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:24px;
    background:linear-gradient(to top,black,transparent);
}

.input-box{
    max-width:1100px;
    margin:auto;
    padding:10px;
    border-radius:30px;
    display:flex;
    gap:12px;
    align-items:flex-end;
}

#prompt{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    background:none;
    color:white;
    padding:16px;
    max-height:240px;
    overflow-y:auto;
    font-size:14px;
}

.send-btn{
    width:60px;
    height:60px;
    border:none;
    border-radius:22px;
    background:var(--neon);
    color:black;
    cursor:pointer;
    transition:0.25s;
}

.send-btn:hover{
    transform:scale(1.05);
}

/* ===== MOBILE ===== */

@media(max-width:1024px){

    .sidebar{
        position:fixed;
        left:0;
        top:0;
        bottom:0;
        z-index:500;
        transform:translateX(-120%);
    }

    .sidebar.open{
        transform:translateX(0);
    }

    .mobile-menu{
        display:flex;
    }

    .msg{
        max-width:95%;
    }

}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

::-webkit-scrollbar{
    width:4px;
}

::-webkit-scrollbar-thumb{
    background:var(--neon);
    border-radius:20px;
}

</style>
</head>
