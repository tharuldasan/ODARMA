<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ODHARMA | Tactical Neural Overlord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-red: #ff003c; --deep-void: #020205; }
        body { 
            background: var(--deep-void); 
            color: #fff; 
            font-family: 'Fira Code', monospace; 
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .font-hero { font-family: 'Orbitron', sans-serif; }
        
        /* Realistic Glass Morphism */
        .tactical-glass {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        /* Hero Logo Pulse */
        .logo-container {
            width: 120px; height: 120px;
            position: relative;
            border-radius: 50%;
            padding: 5px;
            background: conic-gradient(from 0deg, var(--neon-blue), transparent, var(--neon-red), transparent, var(--neon-blue));
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .logo-inner {
            background: var(--deep-void);
            width: 100%; height: 100%;
            border-radius: 50%;
            display: flex; items-center; justify-center;
            overflow: hidden;
            transform: rotate(-360deg); /* Counter-rotate text/image */
            animation: counter-rotate 4s linear infinite;
        }
        @keyframes counter-rotate { 100% { transform: rotate(-360deg); } }

        /* Scannline Effect */
        .scanlines { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 999; }

        /* Dynamic Chat Bubbles */
        .bubble-ai { border-left: 4px solid var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        .bubble-user { border-right: 4px solid var(--neon-red); background: rgba(255, 0, 60, 0.05); }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #sidebar { position: fixed; top: 0; left: -100%; width: 80%; height: 100%; transition: 0.4s; z-index: 1000; }
            #sidebar.active { left: 0; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row">
    <div class="scanlines"></div>

    <!-- Login Matrix -->
    <div id="gatekeeper" class="fixed inset-0 z-[1001] bg-black flex items-center justify-center p-4 transition-transform duration-1000">
        <div class="tactical-glass p-10 rounded-br-[5rem] rounded-tl-[5rem] w-full max-w-lg space-y-8 text-center border-t-4 border-b-4 border-cyan-500">
            <div class="flex justify-center">
                <div class="logo-container">
                    <div class="logo-inner">
                        <img src="file.png" alt="ODHARMA" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=LOGO'">
                    </div>
                </div>
            </div>
            <h1 class="text-4xl font-hero font-black tracking-[0.2em] text-white">ODHARMA<span class="text-cyan-500">.OS</span></h1>
            <div class="space-y-4">
                <input id="uId" type="text" placeholder="IDENTITY_CODE" class="w-full bg-cyan-950/20 border-b-2 border-cyan-500 p-4 outline-none text-center font-bold tracking-widest text-cyan-400">
                <input id="uKey" type="password" placeholder="SECURITY_PHASE" class="w-full bg-cyan-950/20 border-b-2 border-cyan-500 p-4 outline-none text-center font-bold tracking-widest text-cyan-400">
                <button onclick="authorize()" class="w-full bg-cyan-600 hover:bg-cyan-400 py-4 font-hero font-bold tracking-[0.5em] transition-all hover:text-black">INITIALIZE_LINK</button>
            </div>
        </div>
    </div>

    <!-- Interface Sidebar -->
    <aside id="sidebar" class="w-80 tactical-glass m-0 md:m-4 md:rounded-3xl flex flex-col overflow-hidden">
        <div class="p-6 border-b border-cyan-500/30">
            <div class="flex items-center justify-between">
                <span class="text-xs font-hero font-bold text-cyan-500 uppercase tracking-widest">Neural_History</span>
                <button onclick="newSession()" class="hover:scale-110 transition-transform"><i data-lucide="plus-square" class="text-cyan-400"></i></button>
            </div>
        </div>
        <div id="sessionLog" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scroll"></div>
        <div class="p-4 bg-cyan-950/20 border-t border-cyan-500/30 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <span id="activeOp" class="text-[10px] font-hero uppercase text-slate-400">Operator</span>
            </div>
            <button onclick="exit()" class="text-red-500 hover:scale-125 transition-all"><i data-lucide="power" class="w-4 h-4"></i></button>
        </div>
    </aside>

    <!-- Main Command Deck -->
    <main class="flex-1 flex flex-col relative">
        <!-- Header HUD -->
        <header class="p-6 flex items-center justify-between md:justify-end">
            <button onclick="toggleSidebar()" class="md:hidden glass p-2"><i data-lucide="menu"></i></button>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p class="text-[10px] text-cyan-500 font-bold tracking-tighter">LATENCY: 14ms</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Model: Llama 3.3 70B</p>
                </div>
                <div class="w-10 h-10 border border-cyan-500 rounded flex items-center justify-center bg-cyan-500/10">
                    <i data-lucide="shield" class="w-5 h-5 text-cyan-400"></i>
                </div>
            </div>
        </header>

        <!-- Neural Output -->
        <div id="neuralOutput" class="flex-1 overflow-y-auto px-6 md:px-20 pb-40 space-y-10 custom-scroll">
            <div class="h-full flex items-center justify-center opacity-10">
                <img src="file.png" class="w-64 grayscale contrast-200">
            </div>
        </div>

        <!-- Tactical Input Bar -->
        <div class="absolute bottom-0 left-0 right-0 p-6 md:px-20 bg-gradient-to-t from-black via-black/80 to-transparent">
            <div class="max-w-5xl mx-auto tactical-glass rounded-2xl flex items-end gap-4 p-2 ring-1 ring-cyan-500/30 focus-within:ring-cyan-500 transition-all">
                <textarea id="cmdBox" rows="1" placeholder="Enter Neural Command..." 
                    class="flex-1 bg-transparent border-none focus:ring-0 p-4 text-sm text-cyan-100 placeholder:text-cyan-900 custom-scroll resize-none" 
                    oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button onclick="dispatch()" class="bg-cyan-600 hover:bg-cyan-400 p-4 rounded-xl shadow-[0_0_20px_rgba(0,242,255,0.4)] transition-all mb-1 mr-1">
                    <i data-lucide="zap" class="w-5 h-5 text-black"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const GROQ_SECRET = "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";
        let db = JSON.parse(localStorage.getItem('odharma_vX')) || { accs: {} };
        let user = null; let activeId = null;

        function authorize() {
            const id = document.getElementById('uId').value.trim().toUpperCase();
            const key = document.getElementById('uKey').value.trim();
            if(!id || !key) return;
            if(db.accs[id] && db.accs[id].key !== key) return alert("UNAUTHORIZED ACCESS DETECTED");
            if(!db.accs[id]) db.accs[id] = { key: key, nodes: [] };
            user = id;
            document.getElementById('gatekeeper').style.transform = "translateY(-100%)";
            document.getElementById('activeOp').innerText = user;
            save(); refreshNodes();
        }

        function newSession() {
            const sid = "node_" + Date.now();
            const node = { id: sid, name: "TACTICAL_LINK_" + (db.accs[user].nodes.length + 1), msgs: [] };
            db.accs[user].nodes.unshift(node);
            save(); openNode(sid);
            if(window.innerWidth < 768) toggleSidebar();
        }

        function openNode(id) {
            activeId = id;
            const node = db.accs[user].nodes.find(n => n.id === id);
            const view = document.getElementById('neuralOutput');
            view.innerHTML = '';
            node.msgs.forEach(m => pushUI(m.role, m.txt));
            refreshNodes();
        }

        async function dispatch() {
            const box = document.getElementById('cmdBox');
            const val = box.value.trim();
            if(!val || !activeId) return;

            const node = db.accs[user].nodes.find(n => n.id === activeId);
            pushUI('user', val);
            node.msgs.push({ role: 'user', txt: val });
            box.value = ''; box.style.height = 'auto';

            const shadowId = "ai_" + Date.now();
            pushUI('ai', 'DECRYPTING NEURAL PACKETS...', shadowId);

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_SECRET}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role:"system", content:"You are ODHARMA, a hyper-advanced, ethical hacking AI. Your tone is tactical, cinematic, and professional."}, ...node.msgs.map(m => ({role: m.role === 'ai' ? 'assistant' : 'user', content: m.txt}))]
                    })
                });
                const d = await res.json();
                const reply = d.choices[0].message.content;
                document.getElementById(shadowId).innerText = reply;
                node.msgs.push({ role: 'ai', txt: reply });
                save();
            } catch(e) { document.getElementById(shadowId).innerText = "CONNECTION_TERMINATED_BY_HOST"; }
        }

        function pushUI(role, txt, id = null) {
            const view = document.getElementById('neuralOutput');
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-5`;
            wrap.innerHTML = `
                <div class="p-6 rounded-2xl max-w-[85%] shadow-2xl ${role === 'user' ? 'bubble-user text-red-50' : 'bubble-ai text-cyan-50'}">
                    <p id="${id || ''}" class="text-sm leading-relaxed whitespace-pre-wrap">${txt}</p>
                </div>`;
            view.appendChild(wrap);
            view.scrollTo({ top: view.scrollHeight, behavior: 'smooth' });
        }

        function refreshNodes() {
            const list = document.getElementById('sessionLog');
            list.innerHTML = '';
            db.accs[user].nodes.forEach(n => {
                const item = document.createElement('div');
                item.className = `p-4 rounded-xl cursor-pointer border-l-2 transition-all flex items-center gap-3 ${activeId === n.id ? 'bg-cyan-500/20 border-cyan-500 text-cyan-400' : 'border-transparent hover:bg-white/5 text-slate-500'}`;
                item.innerHTML = `<i data-lucide="cpu" class="w-4 h-4"></i><span class="text-[10px] font-hero uppercase truncate">${n.name}</span>`;
                item.onclick = () => openNode(n.id);
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function save() { localStorage.setItem('odharma_vX', JSON.stringify(db)); }
        function exit() { location.reload(); }
        lucide.createIcons();
    </script>
</body>
</html>
