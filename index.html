<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODARMA | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Plus+Jakarta+Sans:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0ea5e9; --bg: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .ethereal-glow { box-shadow: 0 0 40px -10px rgba(14, 165, 233, 0.3); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* Auth Overlay */
        #authOverlay { position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        
        /* Context Menu */
        #contextMenu { position: fixed; z-index: 2000; display: none; width: 150px; }
    </style>
</head>
<body class="h-screen w-screen flex">

    <!-- Auth System -->
    <div id="authOverlay">
        <div class="glass p-8 rounded-3xl w-96 flex flex-col items-center gap-6 ethereal-glow">
            <h1 class="text-4xl font-bold tracking-tighter text-sky-400">ODARMA</h1>
            <div class="w-full space-y-4">
                <input id="accName" type="text" placeholder="Username" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 transition-all">
                <input id="accPass" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-sky-500 transition-all">
                <button onclick="handleAuth()" class="w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-xl font-bold transition-all active:scale-95">ACCESS SYSTEM</button>
            </div>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Device-Locked Encryption Active</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-80 glass m-4 rounded-3xl flex flex-col overflow-hidden">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-xl font-bold italic opacity-80">ODARMA.core</h2>
            <button onclick="createNewChat()" class="p-2 hover:bg-white/5 rounded-full"><i data-lucide="plus-circle" class="w-5 h-5 text-sky-400"></i></button>
        </div>
        
        <div id="sessionList" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scroll">
            <!-- Dynamic Sessions -->
        </div>

        <div class="p-4 border-t border-white/5 bg-black/20">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-sky-500/20 border border-sky-500/50 flex items-center justify-center">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
                <span id="displayUser" class="text-xs font-bold uppercase tracking-wider text-slate-400">Operator</span>
            </div>
        </div>
    </aside>

    <!-- Main Terminal -->
    <main class="flex-1 flex flex-col p-4">
        <div class="flex-1 glass rounded-3xl flex flex-col overflow-hidden relative">
            <!-- Chat Log -->
            <div id="chatLog" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scroll"></div>

            <!-- Typing Area -->
            <div class="p-6 bg-black/40 border-t border-white/5">
                <div class="max-w-4xl mx-auto flex items-end gap-4 bg-white/5 rounded-2xl p-2 border border-white/10 focus-within:border-sky-500/50 transition-all">
                    <textarea id="userInput" rows="1" placeholder="Type a message..." class="flex-1 bg-transparent border-none focus:ring-0 p-3 text-sm resize-none custom-scroll" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button onclick="sendMessage()" class="bg-sky-600 p-3 rounded-xl hover:bg-sky-500 transition-all mb-1 mr-1">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Context Menu -->
    <div id="contextMenu" class="glass rounded-xl overflow-hidden shadow-2xl p-1">
        <button onclick="renameChatPrompt()" class="w-full text-left text-xs px-4 py-2 hover:bg-sky-500/20 rounded flex items-center gap-2"><i data-lucide="edit-3" class="w-3 h-3"></i> Rename</button>
        <button onclick="deleteChat()" class="w-full text-left text-xs px-4 py-2 hover:bg-red-500/20 text-red-400 rounded flex items-center gap-2"><i data-lucide="trash" class="w-3 h-3"></i> Purge</button>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        let currentUser = null;
        let activeChatId = null;
        let db = JSON.parse(localStorage.getItem('odarma_db')) || { users: {} };

        // 1. Auth Logic
        function handleAuth() {
            const user = document.getElementById('accName').value.trim();
            const pass = document.getElementById('accPass').value.trim();
            if(!user || !pass) return;

            if(db.users[user]) {
                if(db.users[user].pass !== pass) return alert("ACCESS DENIED: INCORRECT PASSWORD");
            } else {
                db.users[user] = { pass: pass, chats: [] };
                saveDB();
            }

            currentUser = user;
            document.getElementById('authOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('displayUser').innerText = currentUser;
                renderSessions();
            }, 500);
        }

        // 2. Chat Persistence Logic
        function createNewChat() {
            const id = 'chat_' + Date.now();
            const newChat = { id, name: "New Conversation", history: [] };
            db.users[currentUser].chats.unshift(newChat);
            saveDB();
            loadChat(id);
            renderSessions();
        }

        function loadChat(id) {
            activeChatId = id;
            const chat = db.users[currentUser].chats.find(c => c.id === id);
            const chatLog = document.getElementById('chatLog');
            chatLog.innerHTML = '';
            chat.history.forEach(msg => appendUI(msg.role, msg.content));
            renderSessions();
        }

        async function sendMessage() {
            if(!activeChatId) createNewChat();
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            const chat = db.users[currentUser].chats.find(c => c.id === activeChatId);
            
            // UI & DB Push
            appendUI('user', text);
            chat.history.push({ role: "user", content: text });
            input.value = '';
            input.style.height = 'auto';

            const loadingId = 'ai_' + Date.now();
            appendUI('assistant', '...', loadingId);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "You are ODARMA, an elite AI. Keep your personality consistent."}, ...chat.history]
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;

                document.getElementById(loadingId).innerText = aiMsg;
                chat.history.push({ role: "assistant", content: aiMsg });
                
                // Auto-rename first chat
                if(chat.name === "New Conversation") chat.name = text.substring(0, 25);
                
                saveDB();
                renderSessions();
            } catch (e) {
                document.getElementById(loadingId).innerText = "COMM_LINK_ERROR";
            }
        }

        // 3. UI Helpers
        function appendUI(role, content, id = null) {
            const chatLog = document.getElementById('chatLog');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-sky-600/20 border border-sky-500/30' : 'bg-white/5 border border-white/10'} rounded-2xl px-5 py-3 max-w-[85%] text-sm leading-relaxed">
                    <p id="${id || ''}" class="whitespace-pre-wrap">${content}</p>
                </div>`;
            chatLog.appendChild(div);
            chatLog.scrollTo({ top: chatLog.scrollHeight, behavior: 'smooth' });
        }

        function renderSessions() {
            const list = document.getElementById('sessionList');
            list.innerHTML = '';
            db.users[currentUser].chats.forEach(chat => {
                const btn = document.createElement('div');
                btn.className = `p-3 rounded-xl cursor-pointer text-xs flex items-center gap-3 transition-all ${activeChatId === chat.id ? 'bg-sky-600/20 text-sky-400 border border-sky-500/30' : 'hover:bg-white/5 text-slate-400'}`;
                btn.innerHTML = `<i data-lucide="message-square" class="w-3 h-3"></i> <span class="truncate">${chat.name}</span>`;
                btn.onclick = () => loadChat(chat.id);
                btn.oncontextmenu = (e) => showContextMenu(e, chat.id);
                list.appendChild(btn);
            });
            lucide.createIcons();
        }

        // 4. Context Menu System
        let rightClickId = null;
        function showContextMenu(e, id) {
            e.preventDefault();
            rightClickId = id;
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        window.onclick = () => document.getElementById('contextMenu').style.display = 'none';

        function renameChatPrompt() {
            const newName = prompt("Enter new session name:");
            if(newName) {
                const chat = db.users[currentUser].chats.find(c => c.id === rightClickId);
                chat.name = newName;
                saveDB();
                renderSessions();
            }
        }

        function deleteChat() {
            if(confirm("Confirm deletion of this neural thread?")) {
                db.users[currentUser].chats = db.users[currentUser].chats.filter(c => c.id !== rightClickId);
                if(activeChatId === rightClickId) {
                    activeChatId = null;
                    document.getElementById('chatLog').innerHTML = '';
                }
                saveDB();
                renderSessions();
            }
        }

        function saveDB() { localStorage.setItem('odarma_db', JSON.stringify(db)); }
        
        lucide.createIcons();
    </script>
</body>
</html>
