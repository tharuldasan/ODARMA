<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ODARMA AI</title>

<link rel="icon" type="image/png" href="favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--neon:#00f2ff;
--bg:#020205;
--glass:rgba(15,15,25,0.88);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:var(--bg);
color:white;
width:100vw;
height:100vh;
overflow:hidden;
}

/* ================= LOGIN ================= */

#gate{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:9999;
}

.login-box{
width:95%;
max-width:520px;
padding:40px;
border-radius:40px;
background:var(--glass);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.05);
text-align:center;
}

.hero{
font-family:'Orbitron',sans-serif;
}

.logo-ring{
width:230px;
height:230px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
border:2px solid rgba(0,242,255,0.1);
}

.logo-ring::before{
content:'';
position:absolute;
inset:-5px;
border-radius:50%;
border:3px solid transparent;
border-top:3px solid var(--neon);
border-right:3px solid var(--neon);
animation:spin 2s linear infinite;
}

.logo-img{
width:110px;
height:110px;
object-fit:contain;
z-index:2;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.input{
width:100%;
margin-top:14px;
padding:18px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.05);
color:white;
}

.auth-buttons{
display:flex;
gap:12px;
margin-top:20px;
}

.btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
cursor:pointer;
font-weight:700;
}

.login-btn{
background:var(--neon);
color:black;
}

.signup-btn{
background:transparent;
border:1px solid rgba(0,242,255,0.3);
color:white;
}

/* ================= APP ================= */

.app{
width:100%;
height:100%;
display:flex;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:320px;
background:var(--glass);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
transition:0.3s;
}

.sidebar-top{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.sidebar-buttons{
display:flex;
gap:10px;
}

.icon-btn{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.2s;
}

.icon-btn:hover{
background:rgba(0,242,255,0.14);
}

#threadList{
flex:1;
overflow-y:auto;
padding:14px;
}

.thread{
padding:16px;
border-radius:18px;
background:rgba(255,255,255,0.03);
margin-bottom:10px;
cursor:pointer;
position:relative;
transition:0.2s;
}

.thread:hover{
background:rgba(255,255,255,0.06);
}

.thread.active{
background:rgba(0,242,255,0.12);
border:1px solid rgba(0,242,255,0.2);
}

.thread-name{
font-size:13px;
font-weight:700;
padding-right:30px;
}

.thread-menu{
position:absolute;
right:10px;
top:10px;
}

.menu-btn{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

.dropdown{
position:absolute;
right:0;
top:26px;
width:140px;
background:#111;
border-radius:14px;
overflow:hidden;
display:none;
z-index:100;
border:1px solid rgba(255,255,255,0.05);
}

.dropdown button{
width:100%;
padding:14px;
background:none;
border:none;
color:white;
text-align:left;
cursor:pointer;
}

.dropdown button:hover{
background:rgba(255,255,255,0.06);
}

/* ================= MAIN ================= */

.main{
flex:1;
display:flex;
flex-direction:column;
position:relative;
}

.header{
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
align-items:center;
justify-content:space-between;
}

.mobile-menu{
display:none;
}

#feed{
flex:1;
overflow-y:auto;
padding:20px;
padding-bottom:160px;
}

.message{
max-width:80%;
padding:22px;
border-radius:28px;
line-height:1.7;
margin-bottom:18px;
word-wrap:break-word;
white-space:pre-wrap;
}

.user{
margin-left:auto;
background:rgba(0,242,255,0.14);
}

.ai{
background:rgba(255,255,255,0.05);
}

/* ================= INPUT ================= */

.input-area{
position:absolute;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(to top,black,transparent);
}

.input-box{
max-width:1000px;
margin:auto;
display:flex;
gap:12px;
padding:10px;
border-radius:28px;
background:var(--glass);
border:1px solid rgba(255,255,255,0.05);
}

#prompt{
flex:1;
border:none;
outline:none;
resize:none;
background:none;
color:white;
padding:16px;
max-height:200px;
overflow-y:auto;
}

.send-btn{
width:60px;
height:60px;
border:none;
border-radius:20px;
background:var(--neon);
color:black;
cursor:pointer;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.sidebar{
position:fixed;
left:-100%;
top:0;
bottom:0;
z-index:2000;
}

.sidebar.open{
left:0;
}

.mobile-menu{
display:flex;
}

.message{
max-width:95%;
}

}

::-webkit-scrollbar{
width:4px;
}

::-webkit-scrollbar-thumb{
background:var(--neon);
border-radius:20px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="gate">

<div class="login-box">

<div class="logo-ring">
<img src="favicon.png" class="logo-img">
</div>

<h1 class="hero" style="margin-top:20px;font-size:34px;">
ODARMA
</h1>

<input
id="email"
class="input"
placeholder="EMAIL">

<input
id="password"
type="password"
class="input"
placeholder="PASSWORD">

<div class="auth-buttons">

<button
class="btn login-btn"
onclick="login()">
LOGIN
</button>

<button
class="btn signup-btn"
onclick="signup()">
SIGN UP
</button>

</div>

</div>

</div>

<!-- APP -->

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-top">

<h2 class="hero" style="font-size:14px;">
SYSTEM LOGS
</h2>

<div class="sidebar-buttons">

<div class="icon-btn" onclick="toggleSidebar()">
<i data-lucide="panel-left"></i>
</div>

<div class="icon-btn" onclick="newChat()">
<i data-lucide="plus"></i>
</div>

<div class="icon-btn" onclick="logout()">
<i data-lucide="log-out"></i>
</div>

</div>

</div>

<div id="threadList"></div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div
class="icon-btn mobile-menu"
onclick="toggleSidebar()">

<i data-lucide="menu"></i>

</div>

<div class="hero">
ODARMA AI
</div>

</div>

<div id="feed"></div>

<div class="input-area">

<div class="input-box">

<textarea
id="prompt"
placeholder="Ask ODARMA..."
rows="1"></textarea>

<button
class="send-btn"
onclick="sendMessage()">

<i data-lucide="zap"></i>

</button>

</div>

</div>

</div>

</div>

<script>

lucide.createIcons();

/* ================= CONFIG ================= */

const API_KEY =
"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";

const API_URL =
"https://openrouter.ai/api/v1/chat/completions";

const MODEL =
"meta-llama/llama-3.3-70b-instruct:free";

/* ================= DATABASE ================= */

let db = JSON.parse(
localStorage.getItem("odarma_db")
) || {
users:{}
};

let activeUser =
localStorage.getItem("odarma_user")
|| null;

let activeChat = null;

/* ================= SAVE ================= */

function save(){

localStorage.setItem(
"odarma_db",
JSON.stringify(db)
);

}

/* ================= SIGNUP ================= */

function signup(){

const email =
document.getElementById("email")
.value.trim();

const pass =
document.getElementById("password")
.value.trim();

if(!email || !pass){

alert("Fill all fields");

return;

}

if(db.users[email]){

alert("User already exists");

return;

}

db.users[email] = {

password:pass,
threads:[]

};

save();

alert("Account created");

}

/* ================= LOGIN ================= */

function login(){

const email =
document.getElementById("email")
.value.trim();

const pass =
document.getElementById("password")
.value.trim();

if(
db.users[email] &&
db.users[email].password===pass
){

activeUser = email;

localStorage.setItem(
"odarma_user",
email
);

document.getElementById("gate")
.style.display="none";

renderThreads();

}
else{

alert("Invalid login");

}

}

/* ================= LOGOUT ================= */

function logout(){

localStorage.removeItem(
"odarma_user"
);

location.reload();

}

/* ================= NEW CHAT ================= */

function newChat(){

const id =
"chat_" + Date.now();

db.users[activeUser]
.threads.unshift({

id:id,
title:"New Chat",
messages:[]

});

activeChat=id;

save();

renderThreads();

renderMessages();

}

/* ================= THREADS ================= */

function renderThreads(){

const list =
document.getElementById("threadList");

list.innerHTML="";

db.users[activeUser]
.threads.forEach(thread=>{

const div =
document.createElement("div");

div.className="thread";

if(activeChat===thread.id){
div.classList.add("active");
}

div.innerHTML=`

<div class="thread-name">
${thread.title}
</div>

<div class="thread-menu">

<button
class="menu-btn"
onclick="toggleMenu(event,'${thread.id}')">
⋮
</button>

<div
class="dropdown"
id="menu_${thread.id}">

<button
onclick="renameChat('${thread.id}')">
Rename
</button>

<button
onclick="deleteChat('${thread.id}')"
style="color:#ff5555;">
Delete
</button>

</div>

</div>
`;

div.onclick=()=>{

activeChat=thread.id;

renderThreads();

renderMessages();

};

list.appendChild(div);

});

}

/* ================= CLOSE MENUS ================= */

document.addEventListener(
"click",
()=>{

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

}
);

/* ================= TOGGLE MENU ================= */

function toggleMenu(e,id){

e.stopPropagation();

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

const menu =
document.getElementById(
"menu_" + id
);

menu.style.display =
menu.style.display==="block"
? "none"
: "block";

}

/* ================= RENAME ================= */

function renameChat(id){

const newName =
prompt("New chat name");

if(!newName) return;

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===id
);

chat.title=newName;

save();

renderThreads();

}

/* ================= DELETE ================= */

function deleteChat(id){

db.users[activeUser]
.threads =
db.users[activeUser]
.threads.filter(
t=>t.id!==id
);

if(activeChat===id){

activeChat=null;

document.getElementById("feed")
.innerHTML="";

}

save();

renderThreads();

}

/* ================= RENDER ================= */

function renderMessages(){

const feed =
document.getElementById("feed");

feed.innerHTML="";

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===activeChat
);

if(!chat) return;

chat.messages.forEach(msg=>{

const div =
document.createElement("div");

div.className =
"message " + msg.role;

div.innerHTML =
msg.content;

feed.appendChild(div);

});

feed.scrollTop =
feed.scrollHeight;

}

/* ================= SEND ================= */

async function sendMessage(){

const input =
document.getElementById("prompt");

const text =
input.value.trim();

if(!text) return;

if(!activeChat){
newChat();
}

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===activeChat
);

/* AUTO TITLE */

if(chat.title==="New Chat"){

chat.title =
text.length > 30
? text.substring(0,30)+"..."
: text;

}

/* USER */

chat.messages.push({

role:"user",
content:text

});

renderThreads();

renderMessages();

input.value="";

/* AI PLACEHOLDER */

const feed =
document.getElementById("feed");

const aiDiv =
document.createElement("div");

aiDiv.className =
"message ai";

aiDiv.innerHTML =
"Thinking...";

feed.appendChild(aiDiv);

feed.scrollTop =
feed.scrollHeight;

try{

const response =
await fetch(API_URL,{

method:"POST",

headers:{

"Authorization":
`Bearer ${API_KEY}`,

"Content-Type":
"application/json",

"HTTP-Referer":
window.location.href,

"X-Title":
"ODARMA AI"

},

body:JSON.stringify({

model:MODEL,

messages:chat.messages.map(m=>({

role:
m.role==="ai"
? "assistant"
: "user",

content:m.content

}))

})

});

const data =
await response.json();

console.log(data);

if(data.error){

aiDiv.innerHTML =
data.error.message;

return;

}

const reply =
data.choices?.[0]
?.message?.content
|| "No response";

aiDiv.innerHTML =
reply;

chat.messages.push({

role:"ai",
content:reply

});

save();

}
catch(err){

console.error(err);

aiDiv.innerHTML =
"Connection Error";

}

}

/* ================= SIDEBAR ================= */

function toggleSidebar(){

document
.getElementById("sidebar")
.classList.toggle("open");

}

/* ================= ENTER SEND ================= */

document
.getElementById("prompt")
.addEventListener(
"keydown",
function(e){

if(
e.key==="Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* ================= AUTO LOGIN ================= */

if(activeUser){

document.getElementById("gate")
.style.display="none";

renderThreads();

}

</script>

</body>
</html>
