<html lang="en">

<head>

<title>ODARMA AI</title>

<link rel="icon" href="favicon.png">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
GLOBAL
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#03040a;
--panel:#0b0d18;
--line:rgba(255,255,255,0.06);
--neon:#00e5ff;
}

body{

width:100vw;
height:100vh;

overflow:hidden;

font-family:'Plus Jakarta Sans',sans-serif;

background:

radial-gradient(circle at top left,
rgba(0,229,255,0.08),
transparent 20%),

radial-gradient(circle at bottom right,
rgba(0,229,255,0.05),
transparent 20%),

#03040a;

color:white;

}

/* =========================
LOGIN
========================= */

#gate{

position:fixed;
inset:0;

z-index:9999;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

background:black;

overflow:auto;

}

.login-card{

width:100%;
max-width:600px;

padding:45px;

border-radius:42px;

background:

linear-gradient(
180deg,
rgba(10,10,20,0.98),
rgba(5,5,15,0.98)
);

border:1px solid rgba(0,229,255,0.15);

box-shadow:
0 0 70px rgba(0,229,255,0.08);

text-align:center;

}

/* =========================
LOGO
========================= */

.hero{
font-family:'Orbitron',sans-serif;
}

.logo-ring{

width:340px;
height:340px;

margin:auto;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

position:relative;

border:2px solid rgba(0,229,255,0.12);

box-shadow:
0 0 60px rgba(0,229,255,0.16),
inset 0 0 50px rgba(0,229,255,0.06);

}

.logo-ring::before{

content:'';

position:absolute;

inset:-6px;

border-radius:50%;

border:5px solid transparent;

border-top:5px solid #00e5ff;
border-right:5px solid #00e5ff;

animation:spin 1.5s linear infinite;

box-shadow:
0 0 20px #00e5ff,
0 0 60px #00e5ff;

}

.logo{

width:220px;
height:220px;

object-fit:contain;

filter:
drop-shadow(0 0 20px #00e5ff)
drop-shadow(0 0 50px #00e5ff);

z-index:10;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.login-title{

font-size:46px;

margin-top:24px;
margin-bottom:34px;

}

/* =========================
GOOGLE BUTTON
========================= */

.google-btn{

width:100%;

padding:20px;

border:none;

border-radius:22px;

background:white;

color:black;

font-size:16px;
font-weight:800;

cursor:pointer;

display:flex;
align-items:center;
justify-content:center;
gap:14px;

transition:0.2s;

}

.google-btn:hover{
transform:translateY(-2px);
}

/* =========================
APP
========================= */

.app{
width:100%;
height:100%;
display:flex;
}

/* =========================
SIDEBAR
========================= */

.sidebar{

width:320px;
height:100%;

background:

linear-gradient(
180deg,
rgba(10,10,20,0.98),
rgba(5,5,15,0.98)
);

border-right:1px solid rgba(255,255,255,0.06);

display:flex;
flex-direction:column;

transition:0.3s;

}

/* =========================
SIDEBAR TOP
========================= */

.sidebar-top{

padding:20px;

border-bottom:1px solid rgba(255,255,255,0.06);

}

.top-row{

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:18px;

}

.logo-title{

font-size:26px;
font-weight:900;

letter-spacing:1px;

color:white;

text-shadow:
0 0 10px rgba(0,229,255,0.4);

}

.sidebar-buttons{

display:flex;
gap:10px;

}

/* =========================
BUTTONS
========================= */

.icon-btn{

width:48px;
height:48px;

border-radius:16px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.06);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

transition:0.2s;

}

.icon-btn:hover{

background:rgba(0,229,255,0.12);

border-color:rgba(0,229,255,0.3);

}

.search-input{

width:100%;

padding:15px 16px;

border:none;
outline:none;

border-radius:16px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(255,255,255,0.06);

color:white;

}

/* =========================
THREADS
========================= */

#threadList{

flex:1;

overflow-y:auto;

padding:14px;

}

.thread{

padding:16px;

border-radius:18px;

margin-bottom:10px;

position:relative;

cursor:pointer;

border:1px solid transparent;

transition:0.2s;

}

.thread:hover{

background:rgba(255,255,255,0.04);

}

.thread.active{

background:rgba(0,229,255,0.08);

border:1px solid rgba(0,229,255,0.18);

}

.thread-name{

font-size:14px;
font-weight:700;

padding-right:30px;

}

/* =========================
THREAD MENU
========================= */

.thread-menu{

position:absolute;

top:12px;
right:12px;

}

.menu-btn{

background:none;
border:none;

color:#aaa;

font-size:18px;

cursor:pointer;

}

.dropdown{

position:absolute;

top:28px;
right:0;

width:150px;

background:#151524;

border:1px solid rgba(255,255,255,0.06);

border-radius:16px;

overflow:hidden;

display:none;

z-index:999;

}

.dropdown button{

width:100%;

padding:14px;

background:none;

border:none;

color:white;

text-align:left;

cursor:pointer;

}

.dropdown button:hover{

background:rgba(255,255,255,0.05);

}

/* =========================
SIDEBAR BOTTOM
========================= */

.sidebar-bottom{

padding:18px;

border-top:1px solid rgba(255,255,255,0.06);

display:flex;
align-items:center;
justify-content:space-between;

background:rgba(255,255,255,0.02);

}

.user-info{

display:flex;
align-items:center;
gap:12px;

}

.user-avatar{

width:46px;
height:46px;

border-radius:50%;

background:#00e5ff;

display:flex;
align-items:center;
justify-content:center;

font-weight:900;

color:black;

}

.user-name{

font-size:14px;
font-weight:700;

}

/* =========================
MAIN
========================= */

.main{

flex:1;

display:flex;
flex-direction:column;

position:relative;

}

/* =========================
HEADER
========================= */

.header{

height:78px;

padding:0 24px;

display:flex;
align-items:center;
justify-content:space-between;

border-bottom:1px solid rgba(255,255,255,0.06);

background:

linear-gradient(
180deg,
rgba(15,15,25,0.96),
rgba(10,10,20,0.9)
);

}

.header-title{

font-size:20px;
font-weight:800;

}

/* =========================
FEED
========================= */

#feed{

flex:1;

overflow-y:auto;

padding:40px 20px 180px;

}

.feed-container{

width:100%;
max-width:950px;

margin:auto;

}

/* =========================
MESSAGES
========================= */

.message-row{

width:100%;

display:flex;

margin-bottom:24px;

}

.message-row.user{
justify-content:flex-end;
}

.message{

max-width:760px;

padding:22px 24px;

border-radius:24px;

line-height:1.8;

font-size:15px;

white-space:pre-wrap;

word-wrap:break-word;

}

.user .message{

background:

linear-gradient(
135deg,
rgba(0,229,255,0.18),
rgba(0,229,255,0.08)
);

border:1px solid rgba(0,229,255,0.18);

}

.ai .message{

background:

linear-gradient(
135deg,
rgba(255,255,255,0.04),
rgba(255,255,255,0.02)
);

border:1px solid rgba(255,255,255,0.06);

}

/* =========================
INPUT
========================= */

.input-area{

position:absolute;

left:0;
right:0;
bottom:0;

padding:24px;

background:

linear-gradient(
to top,
rgba(5,5,16,1),
rgba(5,5,16,0)
);

}

.input-container{

width:100%;
max-width:950px;

margin:auto;

}

.input-box{

display:flex;

align-items:center;

gap:14px;

padding:12px;

border-radius:30px;

background:

linear-gradient(
180deg,
rgba(15,15,25,0.98),
rgba(10,10,20,0.96)
);

border:1px solid rgba(255,255,255,0.06);

}

#prompt{

flex:1;

border:none;
outline:none;

resize:none;

background:none;

color:white;

padding:16px;

font-size:15px;

max-height:220px;

overflow-y:auto;

}

/* =========================
SEND BUTTON
========================= */

.send-btn{

width:62px;
height:62px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#00e5ff,
#00c8ff
);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

.send-btn i{

width:26px;
height:26px;

display:flex;
align-items:center;
justify-content:center;

}

/* =========================
POPUP
========================= */

.popup-overlay{

position:fixed;
inset:0;

background:rgba(0,0,0,0.55);

display:none;

align-items:center;
justify-content:center;

z-index:99999;

backdrop-filter:blur(8px);

padding:20px;

}

.popup{

width:100%;
max-width:420px;

padding:30px;

border-radius:28px;

background:

linear-gradient(
180deg,
rgba(12,12,24,0.98),
rgba(5,5,15,0.98)
);

border:1px solid rgba(0,229,255,0.12);

}

.popup-title{

font-size:20px;
font-weight:800;

margin-bottom:12px;

}

.popup-text{

color:#aaa;

line-height:1.7;

margin-bottom:24px;

}

.popup-buttons{

display:flex;
gap:12px;

}

.popup-btn{

flex:1;

padding:14px;

border:none;

border-radius:16px;

cursor:pointer;

font-weight:700;

}

.popup-ok{

background:#00e5ff;
color:black;

}

/* =========================
MOBILE
========================= */

.mobile-menu{
display:none;
}

@media(max-width:900px){

.sidebar{

position:fixed;

left:-100%;

top:0;
bottom:0;

z-index:5000;

}

.sidebar.open{
left:0;
}

.mobile-menu{
display:flex;
}

.logo-ring{
width:260px;
height:260px;
}

.logo{
width:170px;
height:170px;
}

.login-title{
font-size:38px;
}

.message{
max-width:100%;
}

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:rgba(0,229,255,0.4);
border-radius:20px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="gate">

<div class="login-card">

<div class="logo-ring">

<img
src="favicon.png"
class="logo">

</div>

<h1 class="hero login-title">
ODARMA
</h1>

<button
class="google-btn"
onclick="googleLogin()">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="24">

Continue with Google

</button>

</div>

</div>

<!-- APP -->

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-top">

<div class="top-row">

<div class="hero logo-title">
ODARMA
</div>

<div class="sidebar-buttons">

<div
class="icon-btn"
onclick="toggleSidebar()">

<i data-lucide="panel-left"></i>

</div>

<div
class="icon-btn"
onclick="newChat()">

<i data-lucide="plus"></i>

</div>

</div>

</div>

<input
id="searchInput"
class="search-input"
placeholder="Search conversations..."
oninput="renderThreads()">

</div>

<div id="threadList"></div>

<div class="sidebar-bottom">

<div class="user-info">

<div
class="user-avatar"
id="userAvatar">
U
</div>

<div
class="user-name"
id="userName">
User
</div>

</div>

<div
class="icon-btn"
onclick="logout()">

<i data-lucide="log-out"></i>

</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<div
class="icon-btn mobile-menu"
onclick="toggleSidebar()">

<i data-lucide="menu"></i>

</div>

<div class="header-title">
ODARMA AI
</div>

</div>

<div id="feed">

<div
class="feed-container"
id="feedContainer">

</div>

</div>

<div class="input-area">

<div class="input-container">

<div class="input-box">

<textarea
id="prompt"
placeholder="Ask ODARMA..."
rows="1"></textarea>

<button
class="send-btn"
onclick="sendMessage()">

<i data-lucide="zap"></i>

</button>

</div>

</div>

</div>

</div>

</div>

<!-- POPUP -->

<div
class="popup-overlay"
id="popupOverlay">

<div class="popup">

<div
class="popup-title"
id="popupTitle">
Title
</div>

<div
class="popup-text"
id="popupText">
Message
</div>

<div class="popup-buttons">

<button
class="popup-btn popup-ok"
onclick="closePopup()">
OK
</button>

</div>

</div>

</div>

<script>

lucide.createIcons();

/* =========================
OPENROUTER API
========================= */

const API_URL =
"https://openrouter.ai/api/v1/chat/completions";

const API_KEY =
"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";

const MODEL =
"cognitivecomputations/dolphin-mistral-24b-venice-edition:free";

/* =========================
DATABASE
========================= */

let db = JSON.parse(
localStorage.getItem("odarma_db")
) || {
users:{}
};

let activeUser =
localStorage.getItem("odarma_user")
|| null;

let activeChat = null;

/* =========================
SAVE
========================= */

function save(){

localStorage.setItem(
"odarma_db",
JSON.stringify(db)
);

}

/* =========================
POPUP
========================= */

function showPopup(title,text){

document.getElementById(
"popupTitle"
).innerText = title;

document.getElementById(
"popupText"
).innerText = text;

document.getElementById(
"popupOverlay"
).style.display = "flex";

}

function closePopup(){

document.getElementById(
"popupOverlay"
).style.display = "none";

}

/* =========================
GOOGLE LOGIN
========================= */

function googleLogin(){

google.accounts.id.initialize({

client_id:
"8722407741-c61aa11ffjgbchbtpfuo4l0lpcdt19vn.apps.googleusercontent.com",

callback:handleGoogleLogin

});

google.accounts.id.prompt();

}

function handleGoogleLogin(response){

const payload =
parseJwt(response.credential);

const email =
payload.email || "user@gmail.com";

const name =
payload.name ||
payload.given_name ||
email.split("@")[0];

if(!db.users[email]){

db.users[email] = {

name:name,
google:true,
threads:[]

};

save();

}

activeUser = email;

localStorage.setItem(
"odarma_user",
email
);

localStorage.setItem(
"odarma_google_login",
"true"
);

document.getElementById(
"gate"
).style.display = "none";

updateUserInfo();

renderThreads();

}

function parseJwt(token){

return JSON.parse(
atob(
token.split('.')[1]
)
);

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem(
"odarma_user"
);

localStorage.removeItem(
"odarma_google_login"
);

location.reload();

}

/* =========================
USER INFO
========================= */

function updateUserInfo(){

const user =
db.users[activeUser];

if(!user) return;

document.getElementById(
"userName"
).innerText =
user.name || activeUser;

document.getElementById(
"userAvatar"
).innerText =
(user.name || activeUser)
.charAt(0)
.toUpperCase();

}

/* =========================
NEW CHAT
========================= */

function newChat(){

const id =
"chat_" + Date.now();

db.users[activeUser]
.threads.unshift({

id:id,
title:"New Chat",
messages:[]

});

activeChat=id;

save();

renderThreads();

renderMessages();

}

/* =========================
THREADS
========================= */

function renderThreads(){

if(!activeUser) return;

const list =
document.getElementById(
"threadList"
);

const search =
document.getElementById(
"searchInput"
).value.toLowerCase();

list.innerHTML = "";

db.users[activeUser]
?.threads
?.filter(thread=>
thread.title
.toLowerCase()
.includes(search)
)
.forEach(thread=>{

const div =
document.createElement("div");

div.className="thread";

if(activeChat===thread.id){
div.classList.add("active");
}

div.innerHTML = `

<div class="thread-name">
${thread.title}
</div>

<div class="thread-menu">

<button
class="menu-btn"
onclick="toggleMenu(event,'${thread.id}')">
⋮
</button>

<div
class="dropdown"
id="menu_${thread.id}">

<button
onclick="renameChat('${thread.id}')">
Rename
</button>

<button
onclick="deleteChat('${thread.id}')"
style="color:#ff6666;">
Delete
</button>

</div>

</div>
`;

div.onclick = ()=>{

activeChat=thread.id;

renderThreads();

renderMessages();

};

list.appendChild(div);

});

}

/* =========================
MENU
========================= */

document.addEventListener(
"click",
()=>{

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

}
);

function toggleMenu(e,id){

e.stopPropagation();

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

const menu =
document.getElementById(
"menu_" + id
);

menu.style.display =
menu.style.display==="block"
? "none"
: "block";

}

/* =========================
RENAME
========================= */

function renameChat(id){

const newName =
prompt("New conversation name");

if(!newName) return;

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===id
);

chat.title = newName;

save();

renderThreads();

}

/* =========================
DELETE
========================= */

function deleteChat(id){

db.users[activeUser]
.threads =
db.users[activeUser]
.threads.filter(
t=>t.id!==id
);

save();

renderThreads();

renderMessages();

}

/* =========================
MESSAGES
========================= */

function renderMessages(){

const container =
document.getElementById(
"feedContainer"
);

container.innerHTML = "";

if(!activeUser) return;

const chat =
db.users[activeUser]
?.threads
?.find(
t=>t.id===activeChat
);

if(!chat) return;

chat.messages.forEach(msg=>{

const row =
document.createElement("div");

row.className =
"message-row " + msg.role;

const bubble =
document.createElement("div");

bubble.className =
"message";

bubble.innerHTML =
formatMessage(msg.content);

row.appendChild(bubble);

container.appendChild(row);

});

scrollBottom();

}

function formatMessage(text){

return text
.replace(/\n/g,"<br>");

}

/* =========================
SEND MESSAGE
========================= */

async function sendMessage(){

if(!activeUser){

showPopup(
"Login Required",
"Please login first."
);

return;

}

const input =
document.getElementById(
"prompt"
);

const text =
input.value.trim();

if(!text) return;

if(!activeChat){
newChat();
}

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===activeChat
);

if(chat.title==="New Chat"){

chat.title =
text.length > 30
? text.substring(0,30)+"..."
: text;

}

chat.messages.push({

role:"user",
content:text

});

save();

renderThreads();

renderMessages();

input.value = "";

/* THINKING */

const container =
document.getElementById(
"feedContainer"
);

const row =
document.createElement("div");

row.className =
"message-row ai";

const bubble =
document.createElement("div");

bubble.className =
"message";

bubble.innerHTML =
"Thinking...";

row.appendChild(bubble);

container.appendChild(row);

scrollBottom();

try{

await new Promise(
r=>setTimeout(r,1000)
);

const response =
await fetch(API_URL,{

method:"POST",

headers:{

"Authorization":
`Bearer ${API_KEY}`,

"Content-Type":
"application/json",

"HTTP-Referer":
window.location.href,

"X-OpenRouter-Title":
"ODARMA AI"

},

body:JSON.stringify({

model:MODEL,

messages:[

{
role:"system",
content:
"You are ODARMA AI, a futuristic hacker-style AI assistant with concise replies."
},

...chat.messages.map(m=>({

role:
m.role === "user"
? "user"
: "assistant",

content:m.content

}))

]

})

});

const data =
await response.json();

bubble.remove();

/* 429 */

if(response.status === 429){

chat.messages.push({

role:"ai",

content:
"OpenRouter free model is busy right now. Please wait a few seconds and try again."

});

save();

renderMessages();

return;

}

/* ERROR */

if(data.error){

chat.messages.push({

role:"ai",

content:
data.error?.message ||
"OpenRouter API Error"

});

save();

renderMessages();

return;

}

/* REPLY */

const reply =
data.choices?.[0]
?.message?.content
|| "No response";

chat.messages.push({

role:"ai",
content:reply

});

save();

renderMessages();

}
catch(err){

console.error(err);

bubble.remove();

chat.messages.push({

role:"ai",
content:"Connection Error"

});

save();

renderMessages();

}

}

/* =========================
SCROLL
========================= */

function scrollBottom(){

const feed =
document.getElementById(
"feed"
);

feed.scrollTop =
feed.scrollHeight;

}

/* =========================
SIDEBAR
========================= */

function toggleSidebar(){

document
.getElementById("sidebar")
.classList.toggle("open");

}

/* =========================
ENTER SEND
========================= */

document
.getElementById("prompt")
.addEventListener(
"keydown",
function(e){

if(
e.key==="Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* =========================
AUTO LOGIN
========================= */

if(

activeUser &&

localStorage.getItem(
"odarma_google_login"
)==="true"

){

document.getElementById(
"gate"
).style.display = "none";

updateUserInfo();

renderThreads();

}

</script>
