INPUT

.input-area{

linear-gradient(

/* =========================
CUSTOM POPUP

.popup-overlay{

<body>

oninput="renderThreads()">

U

<script>

lucide.createIcons();

/* =========================
OPENROUTER
========================= */

const API_URL =
"https://openrouter.ai/api/v1/chat/completions";

const API_KEY =
"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";

const MODEL =
"google/gemma-4-31b-it:free";

/* =========================
DATABASE
========================= */

let db = JSON.parse(
localStorage.getItem("odarma_db")
) || {
users:{}
};

let activeUser =
localStorage.getItem("odarma_user")
|| null;

let activeChat = null;

/* =========================
SAVE
========================= */

function save(){

localStorage.setItem(
"odarma_db",
JSON.stringify(db)
);

}

/* =========================
POPUP
========================= */

function showPopup(
title,
text,
okCallback=null
){

document.getElementById(
"popupTitle"
).innerText = title;

document.getElementById(
"popupText"
).innerText = text;

document.getElementById(
"popupOverlay"
).style.display = "flex";

const okBtn =
document.getElementById(
"popupOkBtn"
);

okBtn.onclick = ()=>{

closePopup();

if(okCallback){
okCallback();
}

};

}

function closePopup(){

document.getElementById(
"popupOverlay"
).style.display = "none";

}

/* =========================
GOOGLE LOGIN
========================= */

function googleLogin(){

showPopup(
"Google Login",
"Replace YOUR_GOOGLE_CLIENT_ID in the code to enable real Google login."
);

}

/* =========================
SIGNUP
========================= */

function signup(){

const email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

if(!email || !password){

showPopup(
"Missing Fields",
"Please fill all fields."
);

return;

}

if(db.users[email]){

showPopup(
"Account Exists",
"This email already exists."
);

return;

}

db.users[email] = {

password:password,
threads:[],
name:email.split("@")[0]

};

save();

showPopup(
"Success",
"Account created successfully."
);

}

/* =========================
LOGIN
========================= */

function login(){

const email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

if(
db.users[email] &&
db.users[email].password===password
){

activeUser=email;

localStorage.setItem(
"odarma_user",
email
);

document.getElementById(
"gate"
).style.display = "none";

updateUserInfo();

renderThreads();

}
else{

showPopup(
"Login Failed",
"Wrong email or password."
);

}

}

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem(
"odarma_user"
);

location.reload();

}

/* =========================
USER INFO
========================= */

function updateUserInfo(){

if(!activeUser) return;

const user =
db.users[activeUser];

document.getElementById(
"userName"
).innerText =
user.name || activeUser;

document.getElementById(
"userAvatar"
).innerText =
(user.name || activeUser)
.charAt(0)
.toUpperCase();

}

/* =========================
NEW CHAT
========================= */

function newChat(){

const id =
"chat_" + Date.now();

db.users[activeUser]
.threads.unshift({

id:id,
title:"New Chat",
messages:[]

});

activeChat=id;

save();

renderThreads();

renderMessages();

closeSidebarMobile();

}

/* =========================
THREADS
========================= */

function renderThreads(){

const list =
document.getElementById(
"threadList"
);

const search =
document.getElementById(
"searchInput"
).value.toLowerCase();

list.innerHTML = "";

db.users[activeUser]
?.threads
?.filter(thread=>
thread.title
.toLowerCase()
.includes(search)
)
.forEach(thread=>{

const div =
document.createElement("div");

div.className="thread";

if(activeChat===thread.id){
div.classList.add("active");
}

div.innerHTML = `

<div class="thread-name">
${thread.title}
</div>

<div class="thread-menu">

<button
class="menu-btn"
onclick="toggleMenu(event,'${thread.id}')">
⋮
</button>

<div
class="dropdown"
id="menu_${thread.id}">

<button
onclick="renameChat('${thread.id}')">
Rename
</button>

<button
onclick="deleteChat('${thread.id}')"
style="color:#ff6666;">
Delete
</button>

</div>

</div>
`;

div.onclick = ()=>{

activeChat=thread.id;

renderThreads();

renderMessages();

closeSidebarMobile();

};

list.appendChild(div);

});

}

/* =========================
MENU
========================= */

document.addEventListener(
"click",
()=>{

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

}
);

function toggleMenu(e,id){

e.stopPropagation();

document
.querySelectorAll(".dropdown")
.forEach(menu=>{

menu.style.display="none";

});

const menu =
document.getElementById(
"menu_" + id
);

menu.style.display =
menu.style.display==="block"
? "none"
: "block";

}

/* =========================
RENAME
========================= */

function renameChat(id){

const newName =
prompt("New conversation name");

if(!newName) return;

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===id
);

chat.title = newName;

save();

renderThreads();

}

/* =========================
DELETE
========================= */

function deleteChat(id){

showPopup(
"Delete Conversation",
"Are you sure you want to delete this conversation?",
()=>{

db.users[activeUser]
.threads =
db.users[activeUser]
.threads.filter(
t=>t.id!==id
);

save();

renderThreads();

renderMessages();

}
);

}

/* =========================
MESSAGES
========================= */

function renderMessages(){

const container =
document.getElementById(
"feedContainer"
);

container.innerHTML = "";

const chat =
db.users[activeUser]
?.threads
?.find(
t=>t.id===activeChat
);

if(!chat) return;

chat.messages.forEach(msg=>{

const row =
document.createElement("div");

row.className =
"message-row " + msg.role;

const bubble =
document.createElement("div");

bubble.className =
"message";

bubble.innerHTML =
formatMessage(msg.content);

row.appendChild(bubble);

container.appendChild(row);

});

scrollBottom();

}

/* =========================
FORMAT
========================= */

function formatMessage(text){

return text
.replace(/\n/g,"<br>");

}

/* =========================
SEND MESSAGE
========================= */

async function sendMessage(){

const input =
document.getElementById(
"prompt"
);

const text =
input.value.trim();

if(!text) return;

if(!activeChat){
newChat();
}

const chat =
db.users[activeUser]
.threads.find(
t=>t.id===activeChat
);

if(chat.title==="New Chat"){

chat.title =
text.length > 30
? text.substring(0,30)+"..."
: text;

}

chat.messages.push({

role:"user",
content:text

});

renderThreads();

renderMessages();

input.value = "";

/* AI */

const container =
document.getElementById(
"feedContainer"
);

const row =
document.createElement("div");

row.className =
"message-row ai";

const bubble =
document.createElement("div");

bubble.className =
"message";

bubble.innerHTML =
"Thinking...";

row.appendChild(bubble);

container.appendChild(row);

scrollBottom();

try{

const response =
await fetch(API_URL,{

method:"POST",

headers:{

"Authorization":
`Bearer ${API_KEY}`,

"Content-Type":
"application/json",

"HTTP-Referer":
window.location.href,

"X-Title":
"ODARMA AI"

},

body:JSON.stringify({

model:MODEL,

messages:chat.messages.map(m=>({

role:
m.role==="ai"
? "assistant"
: "user",

content:m.content

}))

})

});

const data =
await response.json();

console.log(data);

if(data.error){

bubble.innerHTML =
data.error.message;

return;

}

const reply =
data.choices?.[0]
?.message?.content
|| "No response";

bubble.innerHTML =
formatMessage(reply);

chat.messages.push({

role:"ai",
content:reply

});

save();

}
catch(err){

console.error(err);

bubble.innerHTML =
"Connection Error";

}

}

/* =========================
SCROLL
========================= */

function scrollBottom(){

const feed =
document.getElementById(
"feed"
);

feed.scrollTop =
feed.scrollHeight;

}

/* =========================
SIDEBAR
========================= */

function toggleSidebar(){

document
.getElementById("sidebar")
.classList.toggle("open");

}

function closeSidebarMobile(){

if(window.innerWidth < 900){

document
.getElementById("sidebar")
.classList.remove("open");

}

}

/* =========================
ENTER SEND
========================= */

document
.getElementById("prompt")
.addEventListener(
"keydown",
function(e){

if(
e.key==="Enter" &&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* =========================
AUTO LOGIN
========================= */

if(activeUser){

document.getElementById(
"gate"
).style.display = "none";

updateUserInfo();

renderThreads();

}

</script>

</body>
</html>
